          links_existing: [links_existing,1.0,[[1,2,3]]]
          capacity: [capacity,1.0,[[1,2,3]]]
          potentials: [links_max_cumulative,1.0,[[1,2,3]]]

#transport integration
transport_sector:
  entities:
    commodity__vehicle:
      node:
        - [[[1]],{}]
        - [[[2]],{}]
      link:
        - [[[1,2]],{node_type: balance}]
      node__link__node:
        - [[[1],[1,2],[2]],{node_type: balance}]
      unit:
        - [[[1,2]],{node_type: storage}]
      node__to_unit:
        - [[[2],[1,2]],{node_type: storage}]
        - [[[1],[1,2]],{node_type: storage}]
      unit__to_node:
        - [[[1,2],[2]],{node_type: storage}]
        - [[[1,2],[1]],{node_type: storage}]
      unit_flow__unit_flow:
        - [[[1,2],[2],[1],[1,2]],{node_type: storage}]
        - [[[1,2],[1],[2],[1,2]],{node_type: storage}]
  parameters:
    user: null
    default:
      commodity__vehicle:
        node:
          - [storage_investment_method,no_limits,[[2]],{node_type: storage}]
          - [storage_limit_method,upper_limit,[[2]],{node_type: storage}]
          - [storage_capacity,1.0,[[2]],{node_type: storage}]
          - [flow_scaling_method,scale_to_annual,[[2]],{}]
        node__link__node:
          - [efficiency,1.0,[[1],[1,2],[2]],{node_type: balance}]
        unit:
          - [investment_method,no_limits,[[1,2]],{node_type: storage}]
        node__to_unit:
          - [capacity,1.0,[[1],[1,2]],{node_type: storage}]
        unit__to_node:
          - [capacity,1.0,[[1,2],[1]],{node_type: storage}]
    fixed:
      commodity__vehicle__region:
        node:
          node_type: [node_type,1.0,[[2]]]
    dynamic:
      commodity__vehicle__region:
        node:
          connected_vehicles: [storage_state_upper_limit,[[2]],[normalized,{}],null]
          energy_max: [storages_fix_cumulative,[[2]],[population,{}],null]
          flow_profile: [flow_profile,[[2]],[normalized,{}],null]
          scale_demand: [flow_annual,[[2]],[population,{}],null]
        unit:
          power_available: [availability,[[1,2]],[normalized,{}],null]
          power_capacity: [units_fix_cumulative,[[1,2]],[population,{}],null]
        unit_flow__unit_flow:
          efficiency_in: [equality_ratio,[[1,2],[2],[1],[1,2]],[normalized,{}],null]
          efficiency_out: [equality_ratio,[[1,2],[1],[2],[1,2]],[normalized,{}],null]

