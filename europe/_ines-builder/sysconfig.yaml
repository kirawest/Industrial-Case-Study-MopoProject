# Commodities DB
commodities:
  commodity: 
      node:
        co2_content: [co2_content,1.0]
        commodity_price: [commodity_price,1.0]

# Electricity Demand
residual_demand:
  entities:
    commodity:
      node: null
  parameters:
    default:
      commodity:
        node:
          - [flow_scaling_method,use_profile_directly,[[1]]]
    dynamic:
      commodity__region:
        node:
          flow_profile: [flow_profile,[[1]],[population,{}],null]

# Power Sector DB including Transmission in Target Resolution
power_sector:
  entities:
    technology:
      unit:
        - [[1]]
    commodity__to_technology:
      node:
        - [[1]]
      node__to_unit: 
        - [[1],[2]]
    technology__to_commodity:
      node:
        - [[2]]
      unit__to_node: 
        - [[1],[2]]
    commodity__to_technology__to_commodity: 
      unit_flow__unit_flow:
        - [[2],[3],[1],[2]]
    storage:
      node: 
        - [[1]]
    storage_connection:
      unit: 
        - [[1,2]]
      node__to_unit: 
        - [[1],[1,2]]
        - [[2],[1,2]]
      unit__to_node:
        - [[1,2],[2]]
        - [[1,2],[1]] 
      unit_flow__unit_flow:
        - [[1,2],[2],[1],[1,2]]
        - [[1,2],[1],[2],[1,2]]

  parameters:
    user:
      technology:
        unit:
          investment_method: [technology,investment_method,[[1]],[[1]]]
      storage:
        node:
          storage_investment_method: [storage,investment_method,[[1]],[[1]]]
      storage_connection:
        unit:
          investment_method: [storage,investment_method,[[1]],[[1,2]]]
    default:
      storage:
        node:
          - [node_type,storage,[[1]]]
          - [storage_capacity,1.0,[[1]]]
          - [storage_limit_method,upper_limit,[[1]]]
      storage_connection:  
        node__to_unit:
          - [capacity,1.0,[[2],[1,2]]]
        unit__to_node:
          - [capacity,1.0,[[1,2],[2]]]
    fixed:
      technology:
        unit:
          lifetime: [lifetime,1.0,[[1]]]
      technology__to_commodity:
        unit__to_node:
          capacity: [capacity,1.0,[[1],[2]]]
          investment_cost: [investment_cost,1.0,[[1],[2]]]
          fixed_cost: [fixed_cost,1.0,[[1],[2]]]
          operational_cost: [other_operational_cost,1.0,[[1],[2]]]
      commodity__to_technology__to_commodity:
        unit_flow__unit_flow:
          conversion_rate: [equality_ratio,1.0,[[2],[3],[1],[2]]]
          CO2_captured: [equality_ratio,1.0,[[2],[3],[1],[2]]]
      storage:
        node:
          investment_cost: [storage_investment_cost,1.0,[[1]]]
          lifetime: [storage_lifetime,1.0,[[1]]]
      storage_connection:
        unit:
          lifetime: [lifetime,1.0,[[1,2]]] 
        node__to_unit:
          investment_cost: [investment_cost,1.0,[[2],[1,2]]]
          fixed_cost: [fixed_cost,1.0,[[2],[1,2]]]     
          operational_cost: [other_operational_cost,1.0,[[2],[1,2]]]
        unit_flow__unit_flow:
          efficiency_in: [equality_ratio,1.0,[[1,2],[1],[2],[1,2]]]
          efficiency_out: [equality_ratio,1.0,[[1,2],[2],[1],[1,2]]]
    dynamic:
      technology__region:
        unit:
          units_existing: [units_existing,[[1]],[area,{}],null]

# Variable Renewable Energy
vre:
  entities:
    technology:
      unit:
        - [[1]]
    technology__to_commodity:
      node:
        - [[2]]
      unit__to_node: 
        - [[1],[2]]
    technology_type:
      set: 
        - [[1]]
    technology_type__technology:
      set__unit: 
        - [[1],[2]]
  parameters:
    user:
      technology:
        unit:
          investment_method: [technology,investment_method,[[1]],[[1]]]
    default:
      technology__to_commodity:
        unit__to_node:
          - [capacity,1.0,[[1],[2]]]
    fixed:
      technology:
        unit:
          lifetime: [lifetime,1.0,[[1]]]
      technology__to_commodity:
        unit__to_node:
          investment_cost: [investment_cost,1.0,[[1],[2]]]
          fixed_cost: [fixed_cost,1.0,[[1],[2]]]
          operational_cost: [other_operational_cost,1.0,[[1],[2]]]
    dynamic:
      technology__region:
        unit:
          units_existing: [units_existing,[[1]],[area,{}],null]
      technology__to_commodity__region:
        unit__to_node:
          profile_limit_upper: [profile_limit_upper,[[1],[2]],[potential,{existing: capacity}],null]
      technology_type__region:
        set:
          potential: [max_cumulative,[[1]],[area,{}],null]

# Hydro systems
hydro_systems:
  entities:
    storage:
      node:
        - [[1]]
    technology__to_commodity:
      node:
        - [[2]]
      unit:
        - [[1]]
      unit__to_node:
        - [[1],[2]]
    technology__to_storage:
      unit:
        - [[1]]
      unit__to_node:
        - [[1],[2]]
    commodity__to_technology:
      node__to_unit:
        - [[1],[2]]
    storage__to_technology:
      node__to_unit:
        - [[1],[2]]
    storage__to_technology__to_commodity:
      unit_flow__unit_flow:
        - [[2],[3],[1],[2]]
    commodity__to_technology__to_storage:
      unit_flow__unit_flow:
        - [[2],[3],[1],[2]]
  parameters:
    user: null
    default:
      technology__to_commodity:
        unit:
          - [investment_method,not_allowed,[[1]],[]]
          - [retirement_method,not_retired,[[1]],[]]
        unit__to_node:
          - [capacity,1.0,[[1],[2]],[]]
      technology__to_storage:
        unit:
          - [investment_method,not_allowed,[[1]],[]]
          - [retirement_method,not_retired,[[1]],[]]
        unit__to_node:
          - [capacity,1.0,[[1],[2]],[]]
      storage:
        node:
          - [node_type,storage,[[1]],[]]
          - [storage_capacity,1.0,[[1]],[]]
          - [storage_limit_method,lower_limit,[[1]],[inflow]]
          - [storage_state_fix_method,fix_start,[[1]],[]]
          - [storage_state_binding_method,leap_over_within_period,[[1]],[]]
          - [flow_scaling_method,use_profile_directly,[[1]],[]]
          - [storage_investment_method,not_allowed,[[1]],[]]
          - [storage_retirement_method,not_retired,[[1]],[]]
      storage__to_technology__to_commodity:
        unit_flow__unit_flow:
          - [equality_ratio,1.0,[[2],[3],[1],[2]],[]]
    fixed:
      technology__to_commodity:
        unit__to_node:
          operational_cost: [other_operational_cost,1.0,[[1],[2]]]
    dynamic:
      storage__region:
        node:
          inflow: [flow_profile,[[1]],[area,{}],null]
          storage_capacity: [storages_existing,[[1]],[area,{}],null]
          initial_capacity: [storage_state_fix,[[1]],[normalized,{}],null]
          minimum_capacity: [storage_state_lower_limit,[[1]],[normalized,{}],null]
      technology__to_storage__region:
        unit:
          capacity: [units_existing,[[1]],[area,{}],null]
      technology__to_commodity__region:
        unit__to_node:
          profile: [profile_limit_upper,[[1],[2]],[normalized,{}],null]
        unit:
          capacity: [units_existing,[[1]],[area,{}],null]
      commodity__to_technology__to_storage__region:
        unit_flow__unit_flow:
          efficiency: [equality_ratio,[[2],[3],[1],[2]],[normalized,{}],null]

# power transmission map
power_transmission:
  entities:
    region__transmission__commodity__region:
      node:
        - [[3,1]]
        - [[3,4]]
