# gas sector modelling
gas_sector:
  entities:
    technology:
      unit:
        - [[1]]
    commodity__to_technology:
      node:
        - [[1]]
      node__to_unit: 
        - [[1],[2]]
    technology__to_commodity:
      node:
        - [[2]]
      unit__to_node: 
        - [[1],[2]]
    commodity__to_technology__to_commodity: 
      unit_flow__unit_flow:
        - [[2],[3],[1],[2]]
    storage:
      node: 
        - [[1]]
    storage_connection:
      link: 
        - [[1,2]]
        - [[2,1]]
      node__link__node: 
        - [[1],[1,2],[2]]
        - [[2],[2,1],[1]]
  parameters:
    user:
      technology:
        unit:
          investment_method: 
            - [technology,investment_method,[[1]],[[1]]]
      storage:
        node:
          storage_investment_method: 
            - [storage,investment_method,[[1]],[[1]]]
      storage_connection:
        link:
          investment_method: 
            - [storage,investment_method,[[1]],[[1,2]]]
            - [storage,investment_method,[[1]],[[2,1]]]
    default:
      storage:
        node:
          - [node_type,storage,[[1]]]
          # - [storage_limit_method,upper_limit,[[1]]]
          - [storage_state_binding_method,leap_over_within_period,[[1]]]
    fixed:
      technology:
        unit:
          lifetime: [lifetime,1.0,[[1]]]
          retirement_method: [retirement_method,1.0,[[1]]]
      technology__to_commodity:
        unit__to_node:
          capacity: [capacity,1.0,[[1],[2]]]
          investment_cost: [investment_cost,1.0,[[1],[2]]]
          fixed_cost: [fixed_cost,1.0,[[1],[2]]]
          operational_cost: [other_operational_cost,1.0,[[1],[2]]]
      commodity__to_technology__to_commodity:
        unit_flow__unit_flow:
          conversion_rate: [equality_ratio,1.0,[[2],[3],[1],[2]]]
      storage:
        node:
          storage_retirement_method: [storage_retirement_method,1.0,[[1]]]
          investment_cost: [storage_investment_cost,1.0,[[1]]]
          fixed_cost: [storage_fixed_cost,1.0,[[1]]]
          lifetime: [storage_lifetime,1.0,[[1]]]
          initial_state: [storage_state_fix,1.0,[[1]]]
          capacity: [storage_capacity,1.0,[[1]]]
      storage_connection:
        link:
          retirement_method_in: [retirement_method,1.0,[[2,1]]]
          retirement_method_out: [retirement_method,1.0,[[1,2]]]
        node__link__node:
          capacity_in: [capacity,1.0,[[2],[2,1],[1]]]
          capacity_out: [capacity,1.0,[[1],[1,2],[2]]]  
          operational_cost_in: [operational_cost,1.0,[[2],[2,1],[1]]]
          operational_cost_out: [operational_cost,1.0,[[1],[1,2],[2]]]
          efficiency_in: [efficiency,1.0,[[2],[2,1],[1]]]
          efficiency_out: [efficiency,1.0,[[1],[1,2],[2]]]
    dynamic:
      technology__region:
        unit:
          units_existing: [units_existing,[[1]],[area,{}],null]
      technology__to_commodity__region:
        unit__to_node:
          operational_cost: [other_operational_cost,[[1],[2]],[average,{}],null]
          capacity: [capacity,[[1],[2]],[area,{}],null]
      storage__region:
        node:
          capacity: [storage_capacity,[[1]],[area,{}],null]
          storages_existing: [storages_existing,[[1]],[area,{}],null]
          potentials: [storages_max_cumulative,[[1]],[area,{}],null]
      storage_connection__region:
        link:
          links_existing_in: [links_existing,[[2,1]],[area,{}],null]
          links_existing_out: [links_existing,[[1,2]],[area,{}],null]
          potentials_in: [links_max_cumulative,[[2,1]],[area,{}],null]
          potentials_out: [links_max_cumulative,[[1,2]],[area,{}],null]
        node__link__node:
          capacity_in: [capacity,[[2],[2,1],[1]],[area,{}],null,]
          capacity_out: [capacity,[[1],[1,2],[2]],[area,{}],null]
          operational_cost_in: [operational_cost,[[2],[2,1],[1]],[average,{}],null]
          operational_cost_out: [operational_cost,[[1],[1,2],[2]],[average,{}],null]

